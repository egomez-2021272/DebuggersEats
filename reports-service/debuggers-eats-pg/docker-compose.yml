version: '3.8'

services:

  postgres:
    image: postgres:13
    container_name: debuggers_reports_db
    environment:
      POSTGRES_USER: IN6AM
      POSTGRES_PASSWORD: Admin!
      POSTGRES_DB: debuggers_eats
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: debuggers_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: